<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TV HUB</title>
<style>
body{margin:0;font-family:sans-serif;background:#111;color:white}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;padding:10px}
.card{background:#1c1c1c;padding:10px;border-radius:10px;cursor:pointer;text-align:center}
.card img{width:100%;height:90px;object-fit:contain}
</style>
</head>

<body>

<h2 style="text-align:center">LIVE TV</h2>
<div class="grid" id="grid"></div>

<script>

const API =
"https://sayan-sportlink-jio-tv-main.pages.dev/Channel/channels.json";

fetch(API)
.then(r => r.json())
.then(data => {

  const grid = document.getElementById("grid");

  data.forEach(ch => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${ch.logo}">
      <p>${ch.name}</p>
    `;

    div.onclick = () => {

      if(ch.url){
        window.open(ch.url, "_blank");
      }
      else if(ch.fileName){
        window.open(
          "https://sayan-sportlink-jio-tv-main.pages.dev/Channel/" + ch.fileName,
          "_blank"
        );
      }

    };

    grid.appendChild(div);

  });

});

</script>

</body>
</html
